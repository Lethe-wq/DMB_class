<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="简洁、清晰的会员注册入口">
    <title>会员注册</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page page-register">
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="会员中心首页">
            <span class="brand-mark" aria-hidden="true">M</span>
            <span>会员中心</span>
        </a>
        <nav class="site-nav" aria-label="主要导航">
            <a class="is-active" href="index.html" aria-current="page">注册</a>
            <a href="members.html">会员列表</a>
        </nav>
    </header>

    <main class="page-shell">
        <div class="register-layout">
            <section class="register-intro" aria-labelledby="register-title">
                <p class="eyebrow">MEMBERSHIP</p>
                <h1 id="register-title">让每一次加入，<br>都更简单。</h1>
                <p class="hero-copy">清晰填写基本资料，几步完成会员注册。你的信息将被整齐收录，方便后续查看与管理。</p>
                <a class="text-link" href="members.html">浏览现有会员 <span aria-hidden="true">→</span></a>
            </section>

            <section class="form-card" aria-labelledby="form-title">
                <div class="card-heading">
                    <p class="section-kicker">创建资料</p>
                    <h2 id="form-title">会员注册</h2>
                    <p>填写以下信息以创建新的会员记录。</p>
                </div>

                <form id="registerForm">
                    <fieldset class="form-section">
                        <legend>账户信息</legend>
                        <div class="form-grid">
                            <div class="form-group form-group-wide">
                                <label for="username">姓名</label>
                                <input type="text" id="username" name="username" placeholder="请输入姓名" autocomplete="name" required>
                            </div>
                            <div class="form-group">
                                <label for="psw">密码</label>
                                <input type="password" id="psw" name="psw" placeholder="请输入密码" autocomplete="new-password" required>
                            </div>
                            <div class="form-group">
                                <label for="repsw">确认密码</label>
                                <input type="password" id="repsw" name="repsw" placeholder="请再次输入" autocomplete="new-password" required>
                            </div>
                        </div>
                    </fieldset>

                    <fieldset class="form-section">
                        <legend>个人偏好</legend>
                        <div class="form-grid">
                            <div class="form-group">
                                <span class="field-label">性别</span>
                                <div class="choice-row">
                                    <label class="choice-chip">
                                        <input type="radio" name="gender" value="1" checked>
                                        <span>男</span>
                                    </label>
                                    <label class="choice-chip">
                                        <input type="radio" name="gender" value="0">
                                        <span>女</span>
                                    </label>
                                </div>
                            </div>

                            <div class="form-group">
                                <span class="field-label">爱好</span>
                                <div class="choice-row choice-row-wrap">
                                    <label class="choice-chip">
                                        <input type="checkbox" name="hobby[]" value="游泳">
                                        <span>游泳</span>
                                    </label>
                                    <label class="choice-chip">
                                        <input type="checkbox" name="hobby[]" value="看书">
                                        <span>看书</span>
                                    </label>
                                    <label class="choice-chip">
                                        <input type="checkbox" name="hobby[]" value="爬山">
                                        <span>爬山</span>
                                    </label>
                                    <label class="choice-chip">
                                        <input type="checkbox" name="hobby[]" value="思考">
                                        <span>思考</span>
                                    </label>
                                </div>
                            </div>

                            <div class="form-group form-group-wide">
                                <span class="field-label">生日</span>
                                <div class="date-fields">
                                    <label>
                                        <span class="sr-only">出生年份</span>
                                        <select name="year" id="year">
                                            <option value="1990">1990 年</option>
                                            <option value="1991">1991 年</option>
                                            <option value="1992">1992 年</option>
                                        </select>
                                    </label>
                                    <label>
                                        <span class="sr-only">出生月份</span>
                                        <select name="month" id="month">
                                            <option value="1">1 月</option>
                                            <option value="2">2 月</option>
                                            <option value="3">3 月</option>
                                        </select>
                                    </label>
                                    <label>
                                        <span class="sr-only">出生日期</span>
                                        <select name="day" id="day">
                                            <option value="1">1 日</option>
                                            <option value="2">2 日</option>
                                            <option value="3">3 日</option>
                                        </select>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </fieldset>

                    <fieldset class="form-section">
                        <legend>补充信息</legend>
                        <div class="avatar-field">
                            <div id="avatarImg" class="avatar-preview avatar-1" role="img" aria-label="晨雾蓝头像">
                                <span aria-hidden="true">晨</span>
                            </div>
                            <div class="form-group">
                                <label for="avatarSelect">头像样式</label>
                                <select name="avatar" id="avatarSelect">
                                    <option value="1">晨雾蓝</option>
                                    <option value="2">暖阳橙</option>
                                    <option value="3">松石绿</option>
                                </select>
                                <p class="field-hint">选择一种代表你的柔和色彩。</p>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="message">留言内容</label>
                            <textarea id="message" name="message" rows="4" placeholder="写下一些想说的话..."></textarea>
                        </div>
                    </fieldset>

                    <div class="form-actions">
                        <button class="button button-primary" type="submit">完成注册</button>
                        <button class="button button-secondary" type="reset">重新填写</button>
                    </div>

                    <div id="resultMsg" class="result-msg" role="status" aria-live="polite"></div>
                </form>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <p>会员中心 · 简洁地管理每一份资料</p>
    </footer>

    <script src="js/register.js"></script>
</body>
</html>

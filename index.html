<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员注册</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>会员注册</h1>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">请输入姓名：</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="psw">请输入密码：</label>
                <input type="password" id="psw" name="psw" required>
            </div>

            <div class="form-group">
                <label for="repsw">请再次输入密码：</label>
                <input type="password" id="repsw" name="repsw" required>
            </div>

            <div class="form-group">
                <label>性别：</label>
                <input type="radio" name="gender" value="1" checked> 男
                <input type="radio" name="gender" value="0"> 女
            </div>

            <div class="form-group">
                <label>爱好：</label>
                <input type="checkbox" name="hobby[]" value="游泳"> 游泳
                <input type="checkbox" name="hobby[]" value="看书"> 看书
                <input type="checkbox" name="hobby[]" value="爬山"> 爬山
                <input type="checkbox" name="hobby[]" value="思考"> 思考
            </div>

            <div class="form-group">
                <label>生日：</label>
                <select name="year" id="year">
                    <option value="1990">1990</option>
                    <option value="1991">1991</option>
                    <option value="1992">1992</option>
                </select>年
                <select name="month" id="month">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>月
                <select name="day" id="day">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>日
            </div>

            <div class="form-group">
                <label>头像：</label>
                <img id="avatarImg" src="" alt="头像" width="100px">
                <select name="avatar" id="avatarSelect">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">留言内容：</label>
                <textarea id="message" name="message" rows="4" cols="50" placeholder="请输入留言内容..."></textarea>
            </div>

            <div class="form-actions">
                <button type="submit">提交</button>
                <button type="reset">重置</button>
            </div>

            <div id="resultMsg" class="result-msg"></div>
        </form>

        <div class="nav-link">
            <a href="members.html">查看会员列表</a>
        </div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>

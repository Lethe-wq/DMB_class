<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员列表</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>会员列表</h1>

        <div id="loading">加载中...</div>
        <div id="errorMsg" class="result-msg error"></div>

        <table id="memberTable" border="1" width="100%" cellspacing="0" cellpadding="8">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>年龄</th>
                    <th>性别</th>
                    <th>地址</th>
                    <th>婚姻状况</th>
                    <th>薪水</th>
                    <th>备注</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="memberBody">
            </tbody>
        </table>

        <div class="nav-link">
            <a href="index.html">返回注册</a>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <h2>编辑会员</h2>
            <form id="editForm">
                <input type="hidden" name="id" id="editId">
                <div class="form-group">
                    <label>用户名：</label>
                    <input type="text" name="username" id="editUsername" required>
                </div>
                <div class="form-group">
                    <label>年龄：</label>
                    <input type="number" name="age" id="editAge">
                </div>
                <div class="form-group">
                    <label>性别：</label>
                    <input type="radio" name="sex" value="男" id="editSexMale"> 男
                    <input type="radio" name="sex" value="女" id="editSexFemale"> 女
                </div>
                <div class="form-group">
                    <label>地址：</label>
                    <input type="text" name="addr" id="editAddr">
                </div>
                <div class="form-group">
                    <label>婚姻状况：</label>
                    <input type="radio" name="married" value="已婚" id="editMarriedYes"> 已婚
                    <input type="radio" name="married" value="未婚" id="editMarriedNo"> 未婚
                </div>
                <div class="form-group">
                    <label>薪水：</label>
                    <input type="number" step="0.01" name="salary" id="editSalary">
                </div>
                <div class="form-group">
                    <label>备注：</label>
                    <textarea name="remark" id="editRemark" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit">保存</button>
                    <button type="button" id="editCancel">取消</button>
                </div>
                <div id="editMsg" class="result-msg"></div>
            </form>
        </div>
    </div>

    <script src="js/members.js"></script>
</body>
</html>
